name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.f.outputs.web }}
      api: ${{ steps.f.outputs.api }}
      ml: ${{ steps.f.outputs.ml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          base: main   # compare against main so feature branches detect all changes
          filters: |
            web: 'apps/web/**'
            api: 'apps/api-gateway/**'
            ml: 'ml/ml-gateway/**'

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - working-directory: apps/web
        run: npm ci && npm run lint && npm run build
        env:
          # Public Firebase web config — dummy values just to let the build prerender.
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:1:web:ci"

  api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - working-directory: apps/api-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall -q app run_etl.py run_analytics.py alembic

  ml:
    needs: changes
    if: needs.changes.outputs.ml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - working-directory: ml/ml-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall -q app
