# Example only — DO NOT commit real secrets. Create in-cluster:
#
#   kubectl create secret generic inflasi-ml-secret -n default \
#     --from-literal=MINIO_ACCESS_KEY='<minio-root-user>' \
#     --from-literal=MINIO_SECRET_KEY='<minio-root-password>'
#
# Use the same MinIO creds as inflasi-minio-secret (simplest) or create
# scoped credentials via `mc admin user add` + `mc admin policy attach`.
---
apiVersion: v1
kind: Secret
metadata:
  name: inflasi-ml-secret
  namespace: default
type: Opaque
stringData:
  MINIO_ACCESS_KEY: "inflasi"
  MINIO_SECRET_KEY: "change-me"
