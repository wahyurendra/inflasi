# Example only — DO NOT commit real secrets. Create the real Secrets in-cluster:
#   kubectl create secret generic inflasi-secret -n default \
#     --from-literal=ANALYTICS_DATABASE_URL='postgresql+asyncpg://USER:PASS@inflasi-pg:5432/inflasi' \
#     --from-literal=REDIS_URL='redis://inflasi-redis:6379/0' \
#     --from-literal=BPS_API_KEY='' --from-literal=EIA_API_KEY=''
#
# Firebase service-account JSON (mounted at /secrets/firebase-sa.json by the deployment):
#   kubectl create secret generic inflasi-firebase-sa -n default \
#     --from-file=firebase-sa.json=./firebase-service-account.json
#
# Also create the GHCR pull secret `ghcr-secret` (see k3s-manifest/README).
apiVersion: v1
kind: Secret
metadata:
  name: inflasi-secret
  namespace: default
type: Opaque
stringData:
  ANALYTICS_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@inflasi-pg:5432/inflasi"
  REDIS_URL: "redis://inflasi-redis:6379/0"
  BPS_API_KEY: ""
  EIA_API_KEY: ""
