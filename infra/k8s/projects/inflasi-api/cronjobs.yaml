# ETL + analytics schedules — k8s-native CronJobs replacing the old in-process
# APScheduler (scheduler.py). Each runs the SAME api-gateway image with a command
# override (helyx pattern). Schedules are UTC; original WIB times in comments
# (WIB = UTC+7). concurrencyPolicy Forbid = never overlap a long run.
# NOTE: keep the image tag in sync with deployment.yaml (CI bumps both).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: inflasi-etl-global
  namespace: default
  labels: { app: inflasi-api, component: etl }
spec:
  schedule: "0 23 * * *"            # 06:00 WIB — kurs, energy, fao, commodity, news
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels: { app: inflasi-api, component: etl }
        spec:
          restartPolicy: OnFailure
          imagePullSecrets: [{ name: ghcr-secret }]
          containers:
            - name: etl
              image: ghcr.io/wahyurendra/inflasi-api:e36b4b1a4381
              imagePullPolicy: Always
              command: ["python", "run_etl.py", "--pipeline", "global"]
              envFrom: [{ secretRef: { name: inflasi-secret } }]
              resources:
                requests: { cpu: "250m", memory: "512Mi" }
                limits:   { cpu: "2",    memory: "2Gi" }
---
