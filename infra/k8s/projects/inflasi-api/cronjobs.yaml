apiVersion: batch/v1
kind: CronJob
metadata:
  name: inflasi-batch-forecast
  namespace: default
  labels: { app: inflasi-api, component: forecast }
spec:
  schedule: "0 13 * * *"           # 20:00 WIB — after analytics CronJob settles
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels: { app: inflasi-api, component: forecast }
        spec:
          restartPolicy: OnFailure
          imagePullSecrets: [{ name: ghcr-secret }]
          containers:
            - name: batch-forecast
              image: ghcr.io/wahyurendra/inflasi-api:0.0.0
              imagePullPolicy: Always
              command: ["python", "-m", "app.tasks.batch_forecast", "--horizon", "7,14,30"]
              envFrom: [{ secretRef: { name: inflasi-secret } }]
              resources:
                requests: { cpu: "500m", memory: "1Gi" }
                limits:   { cpu: "4",    memory: "4Gi" }
---
