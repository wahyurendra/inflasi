# Example only — create the real Secret in-cluster:
#   kubectl create secret generic inflasi-web-secret -n default \
#     --from-literal=AUTH_SECRET='<openssl rand -base64 32>'
apiVersion: v1
kind: Secret
metadata:
  name: inflasi-web-secret
  namespace: default
type: Opaque
stringData:
  AUTH_SECRET: "change-me-openssl-rand-base64-32"
