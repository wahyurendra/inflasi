# INFLASI web (Next.js 14 BFF). Stateless -> 2 replicas, rolling.
# The browser only hits this; the Next.js server (route handlers) calls the
# api-gateway in-cluster via NEXT_PUBLIC_API_URL=http://inflasi-api:8001.
# CI bumps the `image:` tag on this file only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inflasi-web
  namespace: default
  labels: { app: inflasi-web }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app: inflasi-web }
  template:
    metadata:
      labels: { app: inflasi-web }
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: web
          image: ghcr.io/wahyurendra/inflasi-web:e36b4b1a4381
          imagePullPolicy: Always
          ports:
            - { containerPort: 3000, name: http }
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://inflasi-api:8001"
            - name: AUTH_TRUST_HOST
              value: "true"
          envFrom:
            - secretRef: { name: inflasi-web-secret }   # AUTH_SECRET
          # tcpSocket (not httpGet /api/health): that route returns 503 when the
          # backend/DB is degraded, which would wrongly flap the web pods. A
          # listening socket is the reliable signal the BFF itself is up.
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
