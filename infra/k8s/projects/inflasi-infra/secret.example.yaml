# Example only — DO NOT commit real secrets. Create in-cluster:
#
#   kubectl create secret generic inflasi-pg-secret -n default \
#     --from-literal=POSTGRES_USER='inflasi' \
#     --from-literal=POSTGRES_PASSWORD='<strong-password>' \
#     --from-literal=POSTGRES_DB='inflasi'
#
#   kubectl create secret generic inflasi-minio-secret -n default \
#     --from-literal=MINIO_ROOT_USER='inflasi' \
#     --from-literal=MINIO_ROOT_PASSWORD='<strong-password>'
#
# IMPORTANT: inflasi-secret.ANALYTICS_DATABASE_URL must match inflasi-pg-secret, e.g.
#   postgresql+asyncpg://inflasi:<password>@inflasi-pg:5432/inflasi
---
apiVersion: v1
kind: Secret
metadata:
  name: inflasi-pg-secret
  namespace: default
type: Opaque
stringData:
  POSTGRES_USER: "inflasi"
  POSTGRES_PASSWORD: "change-me"
  POSTGRES_DB: "inflasi"
---
apiVersion: v1
kind: Secret
metadata:
  name: inflasi-minio-secret
  namespace: default
type: Opaque
stringData:
  MINIO_ROOT_USER: "inflasi"
  MINIO_ROOT_PASSWORD: "change-me"
