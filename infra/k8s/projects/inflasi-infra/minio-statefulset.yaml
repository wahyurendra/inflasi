# MinIO (single node) — object storage for crowdsourced report photos
# (apps/web /api/upload). S3 API on :9000, console on :9001. App/web reach it
# as inflasi-minio:9000. Single instance; distributed mode "later".
apiVersion: v1
kind: Service
metadata:
  name: inflasi-minio
  namespace: default
  labels: { app: inflasi-minio }
spec:
  selector: { app: inflasi-minio }
  ports:
    - { name: s3,      port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inflasi-minio
  namespace: default
  labels: { app: inflasi-minio }
spec:
  serviceName: inflasi-minio
  replicas: 1
  selector:
    matchLabels: { app: inflasi-minio }
  template:
    metadata:
      labels: { app: inflasi-minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-10-13T13-34-11Z
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - { containerPort: 9000, name: s3 }
            - { containerPort: 9001, name: console }
          envFrom:
            - secretRef: { name: inflasi-minio-secret }   # MINIO_ROOT_USER/PASSWORD
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: data, mountPath: /data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 20Gi
