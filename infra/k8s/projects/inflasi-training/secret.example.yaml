# Example only — DO NOT commit real secrets. Create in-cluster:
#
#   kubectl create secret generic inflasi-training-secret -n default \
#     --from-literal=MINIO_ACCESS_KEY='<minio-root-user>' \
#     --from-literal=MINIO_SECRET_KEY='<minio-root-password>' \
#     --from-literal=ADMIN_FIREBASE_TOKEN='<admin-id-token>'
#
# MINIO_ACCESS_KEY / SECRET_KEY may be set to the MinIO root creds for
# simplicity, or scoped via mc admin user / mc admin policy for least privilege.
# ADMIN_FIREBASE_TOKEN is needed for the trainer to POST /api/v1/admin/models;
# without it the artifact still uploads to MinIO and a human can register it.
---
apiVersion: v1
kind: Secret
metadata:
  name: inflasi-training-secret
  namespace: default
type: Opaque
stringData:
  MINIO_ACCESS_KEY: "inflasi"
  MINIO_SECRET_KEY: "change-me"
  ADMIN_FIREBASE_TOKEN: ""
