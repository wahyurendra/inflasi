# One-shot Job that creates the inflasi-models bucket inside MinIO. Run once
# per cluster bootstrap; safe to re-apply (mc mb --ignore-existing).
apiVersion: batch/v1
kind: Job
metadata:
  name: inflasi-minio-create-buckets
  namespace: default
  labels: { app: inflasi-training, component: bootstrap }
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          envFrom:
            - secretRef: { name: inflasi-minio-secret }   # MINIO_ROOT_USER/PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              mc alias set inflasi http://inflasi-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing inflasi/inflasi-models
              mc ls inflasi
