# Training Jobs — manual-trigger (kubectl create job --from=cronjob doesn't work
# since these are Jobs, not CronJobs; use `kubectl apply -f` then delete after).
#
# Order: export → lightgbm → prophet → sarimax → tft (GPU node only) → ensemble.
# Each Job uploads to MinIO + POSTs to /api/v1/admin/models. Promotion to
# is_active is a separate operator step (POST /admin/models/{id}/promote).
#
# CI bumps the image tag on this file when ml/training/** changes.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: inflasi-train-export
  namespace: default
  labels: { app: inflasi-training, component: export }
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: inflasi-training, component: export }
    spec:
      restartPolicy: OnFailure
      imagePullSecrets: [{ name: ghcr-secret }]
      containers:
        - name: trainer
          image: ghcr.io/wahyurendra/inflasi-training:0.0.0
          imagePullPolicy: Always
          args: ["ml.training.export_dataset"]
          envFrom:
            - secretRef: { name: inflasi-minio-secret }   # MINIO_ROOT_USER/PASSWORD
            - secretRef: { name: inflasi-training-secret } # MINIO_ACCESS_KEY/SECRET_KEY/ADMIN_FIREBASE_TOKEN
          env:
            - { name: API_GATEWAY_URL, value: "http://inflasi-api:8080" }
            - { name: MINIO_ENDPOINT, value: "inflasi-minio:9000" }
            - { name: MINIO_BUCKET, value: "inflasi-models" }
            - { name: MODEL_VERSION, value: "v1" }
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits:   { cpu: "4",    memory: "8Gi" }
---
apiVersion: batch/v1
