---
# TFT — only schedules on a GPU node. Drop nodeSelector/runtimeClassName/tolerations
# and the gpu request when no GPU is available (Job will then exit early on
# torch import failure inside the trainer).
apiVersion: batch/v1
kind: Job
metadata:
  name: inflasi-train-tft-h7
  namespace: default
  labels: { app: inflasi-training, component: tft }
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: inflasi-training, component: tft }
    spec:
      restartPolicy: OnFailure
      imagePullSecrets: [{ name: ghcr-secret }]
      runtimeClassName: nvidia
      nodeSelector:
        accelerator: nvidia-a100
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: trainer
          image: ghcr.io/wahyurendra/inflasi-training:0.0.0-gpu
          imagePullPolicy: Always
          args: ["ml.training.train_tft", "--horizon", "7"]
          envFrom:
            - secretRef: { name: inflasi-training-secret }
          env:
            - { name: API_GATEWAY_URL, value: "http://inflasi-api:8080" }
            - { name: MINIO_ENDPOINT, value: "inflasi-minio:9000" }
            - { name: MINIO_BUCKET, value: "inflasi-models" }
            - { name: MODEL_VERSION, value: "v1" }
          resources:
            requests: { cpu: "2", memory: "8Gi", "nvidia.com/gpu": "1" }
            limits:   { cpu: "8", memory: "24Gi", "nvidia.com/gpu": "1" }
---
