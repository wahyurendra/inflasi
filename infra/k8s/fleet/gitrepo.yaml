# Registers the INFLASI app bundles with Rancher Fleet. Apply once in the cluster
# (or create via Rancher Continuous Delivery UI). Fleet then watches these paths and
# rolls deployments when CI bumps the image tag in each deployment.yaml.
#   kubectl apply -f infra/k8s/fleet/gitrepo.yaml
# Requires `github-repo-secret` in fleet-default (see k3s-manifest/README) if private.
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: inflasi
  namespace: fleet-default
spec:
  repo: https://github.com/wahyurendra/inflasi.git
  branch: main
  paths:
    - infra/k8s/projects/inflasi-infra
    - infra/k8s/projects/inflasi-api
    - infra/k8s/projects/inflasi-web
    - infra/k8s/projects/inflasi-ml
    - infra/k8s/projects/inflasi-monitoring
  clientSecretName: github-repo-secret
