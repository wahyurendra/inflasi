version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inflasi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Frontend
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inflasi?schema=public
      ANALYTICS_API_URL: http://analytics:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  # Python Analytics Service
  analytics:
    build: ./analytics
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/inflasi
    depends_on:
      db:
        condition: service_healthy

  # ETL Scheduler
  scheduler:
    build: ./analytics
    command: python scheduler.py
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/inflasi
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
