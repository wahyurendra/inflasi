version: "3.8"

services:
  # Next.js Frontend
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      ANALYTICS_API_URL: http://analytics:8000

  # Python Analytics Service
  analytics:
    build: ./analytics
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}

  # ETL Scheduler
  scheduler:
    build: ./analytics
    command: python scheduler.py
    env_file:
      - .env
    environment:
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}
