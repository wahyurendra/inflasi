# Local dev stack for the INFLASI monorepo.
#   web (Next.js BFF) -> api (FastAPI :8001) -> postgres / redis / minio
# Mirrors the K3s topology: only `web` is meant to be user-facing; the BFF
# reaches the api in-cluster via service DNS (here: http://api:8001).
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inflasi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inflasi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    image: inflasi-api:latest
    # Run migrations, then serve. (In K8s this split becomes an init-container.)
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"]
    environment:
      ANALYTICS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/inflasi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-only-change-me
      PYTHONUNBUFFERED: "1"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: inflasi-web:latest
    environment:
      # api-client.ts reads this and appends /api -> http://api:8001/api/...
      NEXT_PUBLIC_API_URL: http://api:8001
      AUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-change-me}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
